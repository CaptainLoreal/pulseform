<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0e1211" />
  <title>Pulseform — Train with your body, not against it</title>

  <!-- PWA / installability -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pulseform" />

  <!-- Pulseform Design System: tokens (colors / type / spacing / effects / fonts) -->
  <link rel="stylesheet" href="ds/styles.css" />
  <!-- App-level (screen) styles -->
  <link rel="stylesheet" href="src/app.css" />

  <!-- React + Babel (standalone, same approach as the design handoff) -->

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Pulseform Design System components (Button, Badge, ScoreRing, MetricCard, SignalBar, …) -->
  <script src="ds/_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react" src="src/app.jsx"></script>
</body>
</html>
